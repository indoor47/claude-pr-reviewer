name: 'Claude PR Reviewer'
description: 'AI code review on every pull request. Posts structured feedback as a PR comment using Claude.'
author: 'indoor47'

branding:
  icon: 'code'
  color: 'orange'

inputs:
  anthropic_api_key:
    description: 'Your Anthropic API key. Use this OR hosted_api_key, not both.'
    required: false
    default: ''
  hosted_api_key:
    description: 'Hosted tier API key from indoor47/claude-pr-reviewer. No Anthropic account needed.'
    required: false
    default: ''
  model:
    description: 'Claude model to use (claude-sonnet-4-6, claude-opus-4-6, claude-haiku-4-5-20251001)'
    required: false
    default: 'claude-sonnet-4-6'
  max_tokens:
    description: 'Maximum tokens for the review response'
    required: false
    default: '4096'
  ignore_patterns:
    description: 'Comma-separated glob patterns for files to skip (e.g., "*.md,*.lock,package-lock.json")'
    required: false
    default: ''
  strictness:
    description: 'Review strictness: lenient (critical+security only), balanced (default), strict (includes test coverage, docs, tech debt)'
    required: false
    default: 'balanced'
  walkthrough:
    description: 'Include a file-by-file Changes Walkthrough table at the top of the review (true/false)'
    required: false
    default: 'true'
  skip_draft:
    description: 'Skip review for draft pull requests (true/false)'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Run Claude PR Review
      shell: bash
      run: python3 ${{ github.action_path }}/pr_reviewer.py
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        HOSTED_API_KEY: ${{ inputs.hosted_api_key }}
        GITHUB_TOKEN: ${{ github.token }}
        CLAUDE_MODEL: ${{ inputs.model }}
        MAX_TOKENS: ${{ inputs.max_tokens }}
        IGNORE_PATTERNS: ${{ inputs.ignore_patterns }}
        REVIEW_STRICTNESS: ${{ inputs.strictness }}
        REVIEW_WALKTHROUGH: ${{ inputs.walkthrough }}
        SKIP_DRAFT: ${{ inputs.skip_draft }}
